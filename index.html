const QUESTIONS = [{"id":1,"question":"Tom invested cash of $4,000, inventory of $7,000 and equipment of $14,000 to start his business.  The effect of this transaction on the financial statements is:","choices":["Total assets increase by $25,000","Total liabilities increase by $4,000","Total owners\u2019 equity increases by $21,000","Total owners\u2019 equity decreases by $25,000"],"answer":"Total assets increase by $25,000","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":2,"question":"Jill invested cash of $3,000, inventory of $7,000 and equipment of $10,000 to start her business.   Jill still owes $2,000 on the equipment and this note payable will be transferred into her new business.  The effect of this transaction on the financial statements is:","choices":["Total assets increase by 18,000","Total liabilities decrease by $2,000","Total common stock increases by $20,000","Total common stock increases by $18,000"],"answer":"Total common stock increases by $18,000","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":3,"question":"Lucy invested inventory of $5,000, equipment of $8,000 and a note payable of $2,000 was transferred to the business.  The effect of this transaction on the financial statements is:","choices":["Total common stock increased by $15,000","Total assets increased by $15,000","Total assets increased by $11,000","Total common stock increased by $11,000"],"answer":"Total common stock increased by $11,000","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":4,"question":"A business purchased equipment of $5,000 on account.  The effect of this transaction on the financial statements would be:","choices":["Assets increased by $5,000 and Common Stock increased by $5,000","Assets increased by $5,000 and Liabilities increased by $5,000","Expenses increased by $5,000 Liabilities increased by $5,000.","Net income decreased."],"answer":"Assets increased by $5,000 and Liabilities increased by $5,000","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":5,"question":"A business received $4,000 from customers paying on their open accounts.  The effect of this transaction on the financial statements would be:","choices":["There is no change in total assets.","Net income is increased","Liabilities decreased","Assets are increased."],"answer":"There is no change in total assets.","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":6,"question":"In May, a business provided services of $500 to customers who paid $100 and the rest to be paid in the following June:","choices":["Assets increased by $100","Revenue increased by $100","Net Income increased by $500","Liabilities increased by $400"],"answer":"Net Income increased by $500","topic":"Identify the effect of a transaction on the financial statements","difficulty":"easy"},{"id":7,"question":"On January 1, 2025, total assets were $500 and total liabilities were $300.  At December 31, 2025, total assets were $750 and total liabilities were $500.  During the year $100 of dividends were declared and paid.  What was the net income or net loss for 2025?","choices":["$50 net loss","$50 net income","$150 net income","$350 net income"],"answer":"$150 net income","topic":"Solve for missing amounts using owner\u2019s equity relationships.","difficulty":"easy"},{"id":8,"question":"On January 1, 2025, total assets were $700 and total liabilities were $600.  At December 31, 2025, total assets were $800 and total liabilities were $500.  During the year the owners made no new investments and had a net income of $500.  Compute the dollar amount of dividends.","choices":["$100","$200","$300","$400"],"answer":"$300","topic":"Solve for missing amounts using owner\u2019s equity relationships.","difficulty":"easy"},{"id":9,"question":"On January 1, 2025, total assets were $1,000 and total liabilities were $600.  At December 31, 2025, total assets were $1,200 and total liabilities were $700.  During the year the owner made new investments of $100 and withdrew of $200.  How much was the net income for 2025?","choices":["$200","$300","$400","$500","$700"],"answer":"$200","topic":"Solve for missing amounts using owner\u2019s equity relationships.","difficulty":"easy"},{"id":10,"question":"The primary objective of financial accounting is to:","choices":["Serve the decision-making needs of internal users.","Provide accounting information that serves external users.","Monitor consumer needs, tastes, and price concerns.","Provide information on both the costs and benefits of looking after products and services.","Know what, when, and how much product to produce."],"answer":"Provide accounting information that serves external users.","topic":"Describe the role and use of accounting","difficulty":"easy"},{"id":11,"question":"The accounting concept that requires every business to be accounted for separately from other business entities, including its owner or owners is known as the:","choices":["Time-period assumption.","Business entity assumption.","Going-concern assumption.","Revenue recognition principle.","External users of accounting information include all of the following except:","Shareholders.","Customers.","Purchasing managers.","Government regulators."],"answer":"Business entity assumption.","topic":"Describe the role and use of accounting","difficulty":"easy"},{"id":12,"question":"Assets created by selling goods and services on credit are:","choices":["Accounts payable.","Accounts receivable.","Liabilities.","Equity."],"answer":"Accounts receivable.","topic":"Identify the elements of the accounting equation and solve for the missing number.","difficulty":"easy"},{"id":13,"question":"If the liabilities of a company increased $74,000 during a period of time and equity in the company decreased $19,000 during ation until now:","choices":["Balance sheet.","Income statement.","Statement of cash flows.","Statement of retained earnings"],"answer":"Statement of retained earnings","topic":"Describe and prepare the basic financial statements, and describe the use of each.","difficulty":"easy"},{"id":18,"question":"A record of the increases and decreases in a specific asset, liability, equity, revenue, or expense is known as a(n):","choices":["Journal.","Posting.","Trial balance.","Account."],"answer":"Account.","topic":"Define and differentiate the following terms:  account, chart of accounts, double-entry accounting, journal, ledger, and posting.","difficulty":"easy"},{"id":19,"question":"A company's list of accounts and the identification numbers assigned to each account is called a:","choices":["Chart of accounts.","Journal.","Trial balance.","General Journal."],"answer":"Chart of accounts.","topic":"Define and differentiate the following terms:  account, chart of accounts, double-entry accounting, journal, ledger, and posting.","difficulty":"easy"},{"id":20,"question":"The record of all accounts and their balances used by a business is called a:","choices":["Journal.","Chart of accounts.","Ledger (or General Ledger).","General Journal."],"answer":"Ledger (or General Ledger).","topic":"Define and differentiate the following terms:  account, chart of accounts, double-entry accounting, journal, ledger, and posting.","difficulty":"easy"},{"id":21,"question":"Smith Accounting paid $560 to settle an account payable. Which of the following general journal entries will properly record this transaction?","choices":["Debit Office Supplies Expense $560; credit Cash $560.","Debit Office Supplies $560; credit Accounts Payable $560.","Debit Office Supplies $560; credit Cash $560.","Debit Accounts Payable $560; credit Cash $560."],"answer":"Debit Accounts Payable $560; credit Cash $560.","topic":"Journalize routine business transactions for a service company.","difficulty":"easy"},{"id":22,"question":"Williams Company purchased $7,100 of supplies, paying cash immediately. Which of the following general journal entries will properly record this transaction?","choices":["Debit Cash $7,100; credit Supplies $7,100.","Debit Accounts Payable $7,100; credit Supplies $7,100.","Debit Supplies $7,100; credit Cash $7,100.","Debit Supplies $7,100; credit Accounts Payable $7,100."],"answer":"Debit Supplies $7,100; credit Cash $7,100.","topic":"Journalize routine business transactions for a service company.","difficulty":"easy"},{"id":23,"question":"Click Services Company received a $620 utility bill for electric service for the current month. It is not due until the end of the next month which is when they intend to pay it. Which of the following journal entries will be made to record the receipt of the bill:","choices":["Debit Utilities Expense $620; credit Accounts Receivable $620.","Debit Utilities Expense $620; credit Accounts Payable $620.","Debit Accounts Payable $620; credit Utilities Expense $620.","No entry is necessary."],"answer":"Debit Utilities Expense $620; credit Accounts Payable $620.","topic":"Journalize routine business transactions for a service company.","difficulty":"easy"},{"id":24,"question":"A business received cash of $100 for services provided. The journal entry to record the transaction would be:","choices":["Cash debit $100; Unearned Revenue credit $100","Cash debit $100; Owner Capital credit $100","Cash debit $100; Service Revenue credit $100","Cash debit $100; Accounts Receivable credit $100"],"answer":"Cash debit $100; Service Revenue credit $100","topic":"Journalize routine business transactions for a service company.","difficulty":"easy"},{"id":25,"question":"Joe purchased equipment costing $5,000 by making a $1,000 down payment and signed a note payable for the remaining amount due. The journal entry to record the transaction is:","choices":["Debit Equipment $5,000; credit Cash $1,000.","Debit Equipment $1,000; credit Cash $1,00 "$320,000.","$360,000.","$480,000."],"answer":"$320,000.","topic":"Analyze a T-account, being able to identify what causes it to change and solve for the missing number.","difficulty":"easy"},{"id":30,"question":"Pascoe Tool and Dye started the year with accounts payable of $50,000 and ended the year with $60,000.  If Pascoe had $120,000 of credit purchases during the year, what is the amount of payments on accounts payable?","choices":["$60,000.","$100,000.","$110,000.","$130,000."],"answer":"$110,000.","topic":"Analyze a T-account, being able to identify what causes it to change and solve for the missing number.","difficulty":"easy"},{"id":31,"question":"The Prepaid Insurance account had a $455 debit balance at the beginning of the current year; $650 of insurance premiums were paid during the year; and the year-end balance sheet showed $420 of prepaid insurance. What is the amount of insurance expense for the year?","choices":["$455.","$650.","$685.","$1,105."],"answer":"$685.","topic":"Analyze a T-account, being able to identify what causes it to change and solve for the missing number.","difficulty":"easy"},{"id":32,"question":"Which of the following statements about adjusting entries is correct?","choices":["They are made to bring the income statement accounts to zero after financial statements are prepared.","They make sure that the income statement of a business reports all revenues earned and all expenses incurred during a given period.","They are only necessary under the cash basis of accounting.","They are unnecessary if not errors have been made during the accounting period."],"answer":"They make sure that the income statement of a business reports all revenues earned and all expenses incurred during a given period.","topic":"Identify the purpose of adjusting entries.","difficulty":"easy"},{"id":33,"question":"We make adjusting entries to:","choices":["Correct errors that were made in the accounting records","Bring the balance of the revenue, expense and hen a company compares the periodic and perpetual inventory procedures:","choices":["The periodic inventory system is more costly to operate.","One can look at the Purchases account to see what is on hand when using the periodic inventory method.","Inventory losses are more easily identified under periodic.","One can refer to the merchandise inventory account any time throughout the year to see what should be on hand under the perpetual method."],"answer":"One can refer to the merchandise inventory account any time throughout the year to see what should be on hand under the perpetual method.","topic":"Compare periodic and perpetual inventory systems.","difficulty":"medium"},{"id":50,"question":"When a company compares the periodic and perpetual inventory procedures:","choices":["The balance in the Inventory account remains unchanged during the year if using the perpetual inventory procedure.","Cost of goods sold is debited each time a sale is made when using the periodic procedure.","You can\u2019t use FIFO, LIFO or weighted average cost valuation methods if you use perpetual procedure.","When recording a sale of merchandise using perpetual inventory procedures, both the Sales account and Cost of Goods sold accounts are affected."],"answer":"When recording a sale of merchandise using perpetual inventory procedures, both the Sales account and Cost of Goods sold accounts are affected.","topic":"Compare periodic and perpetual inventory systems.","difficulty":"medium"},{"id":51,"question":"Date  |  Inventory\nJanuary 1  |  Beginning Inventory \u2013 20 units at $3 each\nMarch 1  |  Purchase \u2013 50 units at $4 each\nMay 1  |  Sale \u2013 30 units at $10 each\n\nTo record the May 1 sale you would:","choices":["Credit Sales for $100.","Debit Cost of Goods sold for $100.","Debit Cost of Goods Sold for $120.","Debit Cost of goods sold for $300."],"answer":"Debit Cost of Goods sold for $100.","topic":"Record the sale of inventory using the Perpetual FIFO method. Perpetual ts and explain how they get reported on the financial statements.","difficulty":"hard"},{"id":103,"question":"On July 4, 2025, Montana Mining Company purchased the mineral rights to a granite deposit for $800,000. It is estimated that the recoverable granite will be 400,000 tons. During 2025, 100,000 tons of granite was extracted and 40,000 tons were sold. The amount of the Cost of Goods Sold (Depletion Expense) recognized for 2025 was:","choices":["$80,000","$100,000.","$120,000.","$200,000."],"answer":"$80,000","topic":"Account for natural resources and intangible assets and explain how they get reported on the financial statements.","difficulty":"hard"},{"id":104,"question":"On October 10, 2025, Griffen Co. bought gravel rights for $240,000. Another $10,000 was spent to develop the site. The gravel pit is expected to produce an estimated 500,000 tons of gravel and have no salvage value. During 2025, 100,000 tons were removed and 90,000 were sold. The expense recorded for 2025 would be:","choices":["$43,200","$45,000","$48,000","$50,000"],"answer":"$45,000","topic":"Account for natural resources and intangible assets and explain how they get reported on the financial statements.","difficulty":"hard"},{"id":105,"question":"On September 1, 2025, Tall Timer purchased timber rights to $750,000. They spent $50,000 to develop the site. They estimated will be 500,000 board feet of lumber. During 2025 50,000 board feet were cut and 45,000 board feet were sold. The amount of the Depletion Expense recognized for 2025 was:","choices":["$80,000","$75,000","$72,000","$67,500"],"answer":"$72,000","topic":"Account for natural resources and intangible assets and explain how they get reported on the financial statements.","difficulty":"hard"},{"id":106,"question":"A short-term note payable:","choices":["Cannot be used to extend the payment period for an account payable.","Is a written promise to pay a specified amount on a stated future date within one year or the company's operating cycle, whichever is longer.","Is not a liability until the due date.","Is an estimated liability."],"answer":"Is a written promise to pay a specified amount on a stated future date within one year or the company's operating cycle, whichever is longer.","topic":"Explain short-term notes and be able to record transactions relating to short-term notes, including the year-end accrual of interest.","difficulty":"hard"},{"id":107,"question":"On May 1st, Smith Company agrees to accept a 60-day, 6%, $5,100 note from James Company to extend the due date on an overdue account. What is the journal entry that James Company would make, when it records payment of the note on the maturity date? (Use 360 days a year.):","choices":["Debit to Cash for $5,151; credit Interest Revenue $51; credit Notes Receivable $5,100.","Debit to Cash for $5,151; credit Interest Revenue $51; Credit to Notes Payable for $5,100.","Debit to Notes Payable for $5,100; debit Interest Expense for $51; credit Cash $5,151.","Debit Notes Payable $5,100; debit Interest Expense for $51; credit Cash $5,049"],"answer":"Debit to Notes Payable for $5,100; debit Interest Expense for $51; credit Cash $5,151.","topic":"Explain short-term notes and be able to record transactions relating to short-term notes, including the year-end accrual of interest.","difficulty":"hard"},{"id":108,"question":"On October 1, Smith Company signed a 120-day, 8% note payable, with a face value of $9,000. Smith Co. made the appropriate year-end accrual. What is the journal entry in January to record the payment of the note assuming no reversing entry was made? (Use 360 days a year.)","choices":["Debit Notes Payable for $9,000; debit Interest Payable $240; credit cash $9,240.","Debit Cash for $9,240; credit Notes Payable for $9,240.","Debit Notes Payable for $9,240; credit Interest Payable $120; credit Interest Expense $120; credit Cash for $9,000","Debit Notes Payable for $9,000; debit Interest Payable for $184; debit Interest Expense $56; credit cash $9,240"],"answer":"Debit Notes Payable for $9,000; debit Interest Payable for $184; debit Interest Expense $56; credit cash $9,240","topic":"Explain short-term notes and be able to record transactions relating to short-term notes, including the year-end accrual of interest.","difficulty":"hard"},{"id":109,"question":"John Williams earned $45,000 during the year working for an employer when the maximum limit for Social Security was $128,400.  The FICA tax rate for Social Security is 6.2% and the FICA tax rate for Medicare is 1.45%.  The employee\u2019s annual FICA taxes amount is:","choices":["$3,442.50.","$6,287.90.","$2,814.80.","$6,946.20."],"answer":"$3,442.50.","topic":"Explain the payroll process and be able to explain how to account for payroll.","difficulty":"hard"},{"id":110,"question":"John Williams earns $5,550 per month working for an employer. The FICA tax rate for Social Security is 6.2%\u00a0of the first $128,400 earned each calendar year and the FICA tax rate for Medicare is 1.45%\u00a0of all earnings. The current FUTA tax rate is 0.6%, and the SUTA tax rate is 5.4%. Both unemployment taxes are applied to the first $7,000 of an employee's pay. The employee has $184 in federal income taxes withheld. The employee has voluntary deductions for health insurance of $152 and contributes $76 to a retirement plan each month. What is the amount of net pay for the employee for the month of January? (Round your intermediate calculations to two decimal places.):","choices":["$4,369.32","$4,413.72","$4,713.42","$4793.90"],"answer":"$4,713.42","topic":"Explain the payroll process and be able to explain how to account for payroll.","difficulty":"hard"},{"id":111,"question":"During the first week of January, John Williams works 45 hours. For this company, workers earn 150% of their regular rate for hours in excess of 40 per week. His pay rate is $35 per hour, and his wages are subject to no deductions other than FICA Social Security, FICA Medicare, and uring the year working for an employer. The FICA tax rate for Social Security is 6.2%\u00a0of the first $128,400 of employee earnings per calendar year and the FICA tax rate for Medicare is 1.45% of all earnings. The current FUTA tax rate is 0.6%, and the SUTA tax rate is 5.4%. Both unemployment taxes are applied to the first $7,000 of an employee's pay. What is the amount of total unemployment taxes the employee must pay?","choices":["$56.00","$101.50","$0.00","$378.00"],"answer":"$0.00","topic":"Explain employer payroll taxes and be able to account for employer payroll taxes.","difficulty":"hard"},{"id":115,"question":"A contingent liability is:","choices":["A potential obligation that depends on a future event arising from a past transaction or event.","An obligation arising from the purchase of goods or services on credit.","Always a specific amount.","An obligation arising from a future event."],"answer":"A potential obligation that depends on a future event arising from a past transaction or event.","topic":"Describe a contingent liability and be able to identify and apply the criteria for recognition of a contingent liability","difficulty":"hard"},{"id":116,"question":"Contingent liabilities are recorded or disclosed unless they are:","choices":["Reasonably possible.","Possible and estimable.","Probable and estimable.","Remote (very unlikely)."],"answer":"Remote (very unlikely).","topic":"Describe a contingent liability and be able to identify and apply the criteria for recognition of a contingent liability","difficulty":"hard"},{"id":117,"question":"Debt guarantees are:","choices":["Considered to be an unearned revenue.","Considered to be contingent liabilities.","Never disclosed in the financial statements.","Recorded as liabilities even though it is highly unlikely that the original debtor will default."],"answer":"Considered to be contingent liabilities.","topic":"Describe a contingent liability and be able to identify and apply the criteria for recognition of a contingent liability","difficulty":"hard"},{"id":118,"question":"A discount on bonds payable:","choices":["Occurs when a company issues bonds with a contract rate less than the market rate.","Occurs when a company issues bonds with a contract rate more than the market rate.","Increases the Bond Payable account.","Decreases the total bond interest expense."],"answer":"Occurs when a company issues bonds with a contract rate less than the market rate.","topic":"Explain what causes a discount and a premium on bonds payable.","difficulty":"hard"},{"id":119,"question":"Marwick Corporation issues 8%, 5-year bonds with a par value of $1,000,000 and semiannual interest payments. On the issue date, the annual market rate for these bonds is 6%.  These bonds will be issued at:","choices":["A premium","A discount.","Par value.","A cost less than par value."],"answer":"A premium","topic":"Explain what causes a discount and a premium on bonds payable.","difficulty":"hard"},{"id":120,"question":"A bond is issued at a par value when:","choices":["The bond pays no interest.","The bond is not between interest payment dates.","Straight line amortization is used by the company.","The market rate of interest is the same as the contract rate of interest."],"answer":"The market rate of interest is the same as the contract rate of interest.","topic":"Explain what causes a discount and a premium on bonds payable.","difficulty":"hard"},{"id":121,"question":"Smart Technology Company issues 7%, 10-year bonds with a par value of $2,000,000.  The bonds pay interest semiannually.  The market rate of interest is 8% and the bond selling price was $1,864,097. The bond issuance should be recorded as:","choices":["Debit Cash $2,000,000; credit Bonds Payable $2,000,000.","Debit Cash $1,864,097; credit Bonds Payable $1,864,097.","Debit Cash $1,864,097; debit Discount on Bonds Payable $135,903; credit Bonds Payable $2,000,000.","Debit Cash $2,000,000; credit Bonds Payable $1,864,097; credit Discount on Bonds Payable $135,903."],"answer":"Debit Cash $1,864,097; debit Discount on Bonds Payable $135,903; credit Bonds Payable $2,000,000.","topic":"Journalize the issuance of a bond.","difficulty":"hard"},{"id":122,"question":"Smart Technology Company received cash proceeds of $206,948 on a bond issue with a par value of $200,000. The difference between par value and issue price for this bond is recorded as a:","choices":["Credit to Interest Income.","Credit to Premium on Bonds Payable.","Credit to Discount on Bonds Payable.","Debit to Premium on Bonds Payable."],"answer":"Credit to Premium on Bonds Payable.","topic":"Journalize the issuance of a bond.","difficulty":"hard"},{"id":123,"question":"On January 1, a company issued and sold a $400,000, 7%, 10-year bond payable, and received proceeds of $396,000.  Interest is payable each June 30 and December 31.  The company uses the straight-line method to amortize the discount. The journal entry to record the first interest payment is:","choices":["Debit Bond Interest Expense $14,000; credit Cash $14,000.","Debit Bond Interest Expense $28,000; credit Cash $28,000.","Debit Bond Interest Expense $13,800; debit Discount on Bonds Payable $200; credit Cash $14,000.","Debit Bond Interest Expense $14,200; credit Cash $14,000; credit Discount on Bonds Payable $200."],"answer":"Debit Bond Interest Expense $14,200; credit Cash $14,000; credit Discount on Bonds Payable $200.","topic":"Calculate interest expense on a bond with a discount and premium and be able to record an interest payment using the straight-line method.","difficulty":"hard"},{"id":124,"question":"A company issued 5-year, 7% bonds with a par value of $100,000. The market rate when the bonds were issued was 6.5%. The company received $102,105 cash for the bonds. Using the straight-line method, the amount of recorded interest expense for the first semiannual interest period is:","choices":["$3,289.50.","$3,500.00.","$3,613.70.","$6,633.70."],"answer":"$3,289.50.","topic":"Calculate interest expense on a bond with a discount and premium and be able to record an interest payment using the straight-line method.","difficulty":"hard"},{"id":125,"question":"On January 1, 2025, Clyde Incorporated issued $1,000,000, 10%, 6 year bonds for $1,120,000. On December 31, 2025, after two years of straight-line amortization, Clyde\u2019s balance sheet showed Bonds Payable of $1,000,000 and a Premium on Bonds Payable of $80,000.  On December 31, 2025, the carrying value of the bonds is:","choices":["$920,000.","$1,000,000.","$1,080,000.","$1,120,000."],"answer":"$1,080,000.","topic":"Determine the carrying value of a bond that gets reported on the balance sheet.","difficulty":"hard"},{"id":126,"question":"On January 1, a company issued and sold a $400,000, 7%, 10-year bond payable, and received proceeds of $396,000. Interest is payable each June 30 and December 31. The company uses the straight-line method to amortize the discount. The carrying value of the bonds immediately after the first interest payment is:","choices":["$399,800.","$400,200.","$395,800.","$396,200."],"answer":"$396,200.","topic":"Determine the carrying value of a bond that gets reported on the balance sheet.","difficulty":"hard"},{"id":127,"question":"On January 1, Year 1, Wheels Incorporated borrowed $130,000 on a 10-year, 8% installment note payable. The terms of the note require Stratton to pay 10 equal payments of $19,374 each December 31 for 10 years. The required general journal entry to record the payment on the note on December 31, Year 2 is:","choices":["Debit Notes Payable $130,000; debit Interest Expense $6,374; credit Cash $19,374.","Debit Interest Expense $9,682; debit Notes Payable $9,692; credit Cash $19,374.","Debit Interest Expense $10,400; debit Interest Expense $8,974; credit cash $19,374.","Debit Interest Expense $10,400; debit Notes Payable $8,974; credit cash $19,374."],"answer":"Debit Interest Expense $9,682; debit Notes Payable $9,692; credit Cash $19,374.","topic":"Be able to calculate the interest and principle components of an installment note payment and be able to record the installment payment.","difficulty":"hard"},{"id":128,"question":"Which of the following statements reflects a characteristic of corporations?","choices":["There is mutual agency for the stockholders meaning that the stockholders have the power to bind the corporation to contracts.","The corporation is a separate legal entity and therefore pays income taxes.","The stockholders have unlimited liability and therefore are ultimately responsible for the corporation\u2019s debts.","A corporation has a limited life which means if a stockholder dies or sells the stock it owns, then a new corporate charter must be submitted."],"answer":"The corporation is a separate legal entity and therefore pays income taxes.","topic":"Identify the characteristics of corporations and rights of their shareholders.","difficulty":"hard"},{"id":129,"question":"Which of the following statements describing a corporation is true?","choices":["The stockholders are the creditors of the corporation.","A corporation is subject to greater governmental regulation than a partnership.","When the ownership of a corporation changes (stockholder sells his/her shares), the corporation must make a new corporate charter.","Stockholders own the business and manage its day-to-day operations."],"answer":"A corporation is subject to greater governmental regulation than a partnership.","topic":"Identify the characteristics of corporations and rights of their shareholders.","difficulty":"hard"},{"id":130,"question":"Which of the following is an ownership right of a common stockholder in a corporation?","choices":["The right to preempt or veto board of directors' decisions.","Right to vote in the election of board of directors.","Declare dividends","The right to dispose of their shares but only with approval from other owners."],"answer":"Right to vote in the election of board of directors.","topic":"Identify the characteristics of corporations and rights of their shareholders.","difficulty":"hard"},{"id":131,"question":"The right of common shareholders to protect their proportionate interest in a corporation by having the first opportunity to buy additional proportionate shares of common stock issued by the corporation is called a:","choices":["Cumulative Right.","Preemptive right.","Proxy right.","Voting right."],"answer":"Preemptive right.","topic":"Identify the characteristics of corporations and rights of their shareholders.","difficulty":"hard"},{"id":132,"question":"When 5,000 shares of $1 par common stock are issued at $5 per share, total paid-in capital:","choices":["Common stock will be credited for $25,000.","Paid-in capital in excess of par value will be credited for $25,000.","Gain on sale of common stock will be credited for $20,000.","Paid-in capital in excess of par value will be credited for $20,000."],"answer":"Paid-in capital in excess of par value will be credited for $20,000.","topic":"Journalize the issuance of shares of capital stock for cash or noncash assets","difficulty":"hard"},{"id":133,"question":"The entry to record the issuance of 5,000 shares of $10 par common stock for $13 per share includes a:","choices":["Debit to cash for $50,000","Credit to gain on sale of common stock for $15,000","Credit to common stock for $50,000","Credit to common stock for $65,000"],"answer":"Credit to common stock for $50,000","topic":"Journalize the issuance of shares of capital stock for cash or noncash assets","difficulty":"hard"},{"id":134,"question":"Carey Company is a publicly held corporation whose $10 par value stock is currently trading at $20 per share. The company issued 3,000 shares of stock to acquire land recently listed for sale at $45,000. Carey Company will record the Land at:","choices":["$60,000","$45,000","$30,000","Not enough information is given to determine the cost of the land."],"answer":"$60,000","topic":"Journalize the issuance of shares of capital stock for cash or noncash assets","difficulty":"hard"},{"id":135,"question":"Shelby Incorporated decided to exchange 10,000 shares of $2.00 par common stock in exchange for legal services. The shares had a fair market value of $5 per share. The journal entry to record this event would include a:","choices":["Credit of $50,000 to the Common Stock account.","Credit of $50,000 to the cash account.","Debit to Legal Expenses for $30,000.","Debit to Legal Expenses for $50,000."],"answer":"Debit to Legal Expenses for $50,000.","topic":"Journalize the issuance of shares of capital stock for cash or noncash assets","difficulty":"hard"},{"id":136,"question":"Wolfe Inc. had purchased 10,000 shares of treasury stock for $5 per share for a total cost of $50,000. The company reissues 4,000 of those treasury shares for $8 per share. The effect of this transaction will be:","choices":["Total assets will increase by $32,000.","Total assets will increase by $20,000.","There will be a gain on sale of treasury stock of $12,000.","Common Stock increases by $32,000."],"answer":"Total assets will increase by $32,000.","topic":"Identify the effects of treasury stock transactions on the financial statements.","difficulty":"hard"},{"id":137,"question":"Debit Cash $600; credit Common Stock $600","choices":["Debit Cash $600; credit Gain on sale of treasury stock $100; credit Treasury Stock $500","Debit Cash $600; credit PIC-Treasury Stock $100; credit Treasury Stock $500","Debit Cash $600; credit PIC in Excess of Par \u2013 Common Stock $250; credit Treasury Stock $250"],"answer":"Debit Cash $600; credit PIC-Treasury Stock $100; credit Treasury Stock $500","topic":"On March 1, 2020, Ace Inc. purchased 100 shares of its own $5 par common stock for $10 per share. On June 2, 2020, Ace I","difficulty":"hard"},{"id":138,"question":"Witt Co. has 8,000 shares of treasury stock with a unit cost of $6 or total cost of $48,000. Hogan Co. reissues 5,000 shares of treasury stock for $7 per share. The effect of this entry on the financial statements will be:","choices":["Total assets will increase by $35,000.","Paid in Capital in Excess of Par Value Treasury Stock will increase by $35,000.","Net income will increase by $5,000.","Common Stock will increase by $35,000"],"answer":"Total assets will increase by $35,000.","topic":"On March 1, 2020, Ace Inc. purchased 100 shares of its own $5 par common stock for $10 per share. On June 2, 2020, Ace I","difficulty":"hard"},{"id":139,"question":"The board of directors declares and pays the annual dividend on the preferred stock and a $1 per share dividend on the common stock. This will cause:","choices":["A decrease in retained earnings of $130,000","A decrease in cash of $200,000.","A decrease in stockholders\u2019 equity of $220,000","A decrease in cash of $50,000"],"answer":"A decrease in retained earnings of $130,000","topic":"Compute the amount of cash dividends paid to preferred and common stockholders. The stockholders\u2019 equity of ABC Inc. inc","difficulty":"hard"},{"id":140,"question":"On December 1, 2025, Harris, Inc. had the following capital stock outstanding:\nStock  |  Shares\n6% preferred stock, $50 per cumulative  |  8,000 shares\nCommon Stock, $10 par  |  20,000 shares\n\nDividends were not declared or paid at all in 2025 and 2025. Cash dividends of $102,000 were declared in on December 31, 2025. The total amounts of cash dividends distributed to preferred and common stockholders in 2025 are:","choices":["Preferred: $51,000; Common: $51,000","Preferred: $68,000; Common: $34,000","Preferred: $72,000; Common: $30,000","Preferred: $84,000; Common: $18,000"],"answer":"Preferred: $72,000; Common: $30,000","topic":"Compute the amount of cash dividends paid to preferred and common stockholders. The stockholders\u2019 equity of ABC Inc. inc","difficulty":"hard"},{"id":141,"question":"Stock  |  Shares\n4% preferred stock, $100 par, cumulative  |  8,000 shares\nCommon Stock, $10 par  |  20,000 shares\n\nDividends were not declared or paid at all in 2025. Cash dividends of $102,000 were declared in on December 31, 2025. The total amounts of cash dividends distributed to preferred and common stockholders in 2025 are:","choices":["Preferred: $51,000; Common: $51,000","Preferred: $32,000; Common: $70,000","Preferred: $64,000; Common: $38,000","Preferred: $96,000; Common: $ 6,000"],"answer":"Preferred: $64,000; Common: $38,000","topic":"On December 1, 2020, Harris, Inc. had the following capital stock outstanding:","difficulty":"hard"},{"id":142,"question":"The board of directors declares and pays the annual dividend on the preferred shares and a $2 per share dividend on the common share. This will cause:","choices":["A decrease in cash of $60,000.","A decrease in cash of $280,000.","A decrease in stockholders\u2019 equity of $280,000","An increase in stockholders\u2019 equity of $60,000."],"answer":"A decrease in cash of $60,000.","topic":"The stockholders' equity section of the Blandings Co. balance sheet contains the following information: 4%, Preferred St","difficulty":"hard"},{"id":143,"question":"A company had a beginning balance in retained earnings of $430,000. It had net income of $60,000 and declared and paid cash dividends of $56,250 in the current period. The ending balance in retained earnings equals:","choices":["$546,250.","$426,250.","$116,250.","$433,750."],"answer":"$433,750.","topic":"Identify the effects of cash dividends, stock dividends and stock splits have on the financial statements.","difficulty":"hard"},{"id":144,"question":"Which of the following is true of a stock dividend:","choices":["The decision to declare a stock dividend resides with the shareholders.","Transfers a portion of equity from retained earnings to a cash reserve account.","Does not affect total equity, but transfers amounts between the components of equity.","Reduces a corporation\u2019s assets and stockholder\u2019s equity."],"answer":"Does not affect total equity, but transfers amounts between the components of equity.","topic":"Identify the effects of cash dividends, stock dividends and stock splits have on the financial statements.","difficulty":"hard"},{"id":145,"question":"On September 1, Ziegler Corporation had 50,000 shares of $5 par value common stock, and $1,500,000 of retained earnings. On that date, when the market price of the stock is $15 per share, the corporation issues a 2-for-1 stock split. The general journal entry to record this transaction is:","choices":["Debit Retained Earnings $750,000; credit Common Stock Split Distributable $750,000.","Debit Retained Earnings $750,000; credit Common Stock $750,000.","Debit Retained Earnings $250,000; credit Stock Split Payable $250,000.","No entry is made for this transaction."],"answer":"No entry is made for this transaction.","topic":"Identify the effects of cash dividends, stock dividends and stock splits have on the financial statements.","difficulty":"hard"},{"id":146,"question":"Cash flows from interest received on loans are reported in the statement of cash flows as part of:","choices":["Operating activities.","Financing activities.","Investing activities","Non-cash activities"],"answer":"Operating activities.","topic":"Define the activities on the statement of cash flows and be able to properly classify activities","difficulty":"hard"},{"id":147,"question":"Which of the following items is reported on the statement of cash flows under financing activities?","choices":["Declaration of a cash dividend.","Payment of a cash dividend.","Declaration of a stock dividend.","Payment of a stock dividend."],"answer":"Payment of a cash dividend.","topic":"Define the activities on the statement of cash flows and be able to properly classify activities","difficulty":"hard"},{"id":148,"question":"Activities that involve the production or purchase of merchandise and the sale of goods and services to customers, including expenditures related to administering the business, are classified as:","choices":["Financing activities.","Investing activities.","Operating activities.","Direct activities."],"answer":"Operating activities.","topic":"Define the activities on the statement of cash flows and be able to properly classify activities","difficulty":"hard"},{"id":149,"question":"Which one of the following is representative of typical cash flows from operating activities:","choices":["Repayment of the principal of a loan.","Payments to purchase equity securities of another company.","Cash receipts from cash sales.","Proceeds received from borrowing money."],"answer":"Cash receipts from cash sales.","topic":"Define the activities on the statement of cash flows and be able to properly classify activities","difficulty":"hard"},{"id":150,"question":"A company's income statement showed the following: net income, $124,000 and depreciation expense, $30,000. An examination of the company's current assets and current liabilities showed the following changes as a result of operating activities: accounts receivable decreased $9,400; merchandise inventory increased $18,000; and accounts payable increased $3,400. Calculate the net cash provided or used by operating activities:","choices":["$148,800.","178,000.","$159,200.","$118,000."],"answer":"$148,800.","topic":"Prepare the Statement of Cash Flows using the indirect method for operating activities.","difficulty":"hard"},{"id":151,"question":"When using the indirect method to calculate and report net cash provided or used by operating activities, which of the following is subtracted from net income?","choices":["Decrease in Income Tax Payable.","Depreciation Expense.","Decrease in Inventory.","Decrease in Accounts Payable."],"answer":"Decrease in Income Tax Payable.","topic":"Prepare the Statement of Cash Flows using the indirect method for operating activities.","difficulty":"hard"},{"id":152,"question":"Net income for the year  |  $52,000\nAccounts payable increased by  |  $18,000\nAccounts receivable decreased by  |  $25,000\nInventories decreased by  |  $5,000\nCash dividends paid were  |  $14,000\nDepreciation expense was  |  $20,000\n\nIn preparing a company\u2019s statement of cash flow for the most recent year using the indirect method based on the following information what is the net cash provided by operating activities:","choices":["$120,000.","$110,000.","$106,000.","$84,000."],"answer":"$120,000.","topic":"Prepare the Statement of Cash Flows using the indirect method for operating activities.","difficulty":"hard"},{"id":153,"question":"A machine with a cost of $130,000 and accumulated depreciation of $85,000 is sold for $50,000 cash.  The amount that should be reported as a source of cash under cash flows from investing activities is:","choices":["$50,000.","$5,000.","$45,000.","$0. This is an operating activity."],"answer":"$50,000.","topic":"Calculate cash flows from financing and investing activities.","difficulty":"hard"},{"id":154,"question":"A company reported that its bonds with a par value of $50,000 and a carrying value of $57,000 are retired for $60,000 cash, resulting in a loss of $3,000.  The amount to be reported under cash flows from financing activities is:","choices":["$(3,000).","$60,000.","$(57,000).","$0. This is an operating activity."],"answer":"$60,000.","topic":"Calculate cash flows from financing and investing activities.","difficulty":"hard"},{"id":155,"question":"Loss on the sale of equipment  |  $14,000\nPurchase of equipment  |  $145,000\nProceeds from the sale of equipment  |  $126,000\nRepayment of outstanding bonds  |  $87,000\nPurchase of treasury stock  |  $62,000\nIssuance of common stock  |  $96,000\nPurchase of land  |  $115,000\nIncrease in accounts receivable during the year  |  $43,000\nDecrease in accounts payable during the year  |  $75,000\nPayment of cash dividends  |  $35,000\n\nBased on the following information what is the net cash flow from investing activities for the year:","choices":["$134,000 of net cash used by investing activities.","$134,000 of net cash provided by investing activities.","$120,000 of net cash used by investing activities.","$221,000 of net cash provided by investing activities."],"answer":"$134,000 of net cash used by investing activities.","topic":"Calculate cash flows from financing and investing activities.","difficulty":"hard"},{"id":156,"question":"The statement of cash flows reports:","choices":["Cash flows from operating activities.","Cash flows from financing activities.","Cash flows from investing activities.","All of the choices are reported on a statement of cash flows."],"answer":"All of the choices are reported on a statement of cash flows.","topic":"Explain the purpose of the statement of cash flows.","difficulty":"hard"},{"id":157,"question":"The statement of cash flows reports:","choices":["Cash inflows and cash outflows for an accounting period.","Equity, net income, and dividends.","Assets, liabilities, and equity.","Revenues, gains, expenses, and losses."],"answer":"Cash inflows and cash outflows for an accounting period.","topic":"Explain the purpose of the statement of cash flows.","difficulty":"hard"},{"id":158,"question":"Be able to identify the purpose of certain financial ratios (current ratio, return on assets, debt ratio, profit margin, days\u2019 sales uncollected, inventory turnover, times interest earned, price earnings ratio).","choices":["Which of the following inventory turnover ratios best indicates effective inventory management?","3.0","1.0.","8.0.","5.0."],"answer":"8.0.","topic":"General Accounting","difficulty":"hard"},{"id":159,"question":"Profit margin measured by which of the following:","choices":["Gross profit divided by Net Sales.","Gross profit divided by Sales before returns and allowances.","Net income divided by Net Sales.","Net income divided by Sales before returns and allowances."],"answer":"Net income divided by Net Sales.","topic":"General Accounting","difficulty":"hard"},{"id":160,"question":"Which of the following will have the most favorable impact on the current ratio:","choices":["Reducing the number of days customers are allowed to pay.","Paying off a short-term note payable with a long-term note payable.","Purchasing more inventory on account.","None of these will favorably impact the current ratio."],"answer":"Paying off a short-term note payable with a long-term note payable.","topic":"General Accounting","difficulty":"hard"}];
</script>
<script type="text/babel">
const { useState, useEffect } = React;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function callClaude(apiKey, messages, system) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 400,
      system: system,
      messages: messages,
    }),
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error && e.error.message ? e.error.message : 'API error');
  }
  const d = await r.json();
  return d.content[0].text;
}

const SOCRATIC = `You are a Socratic accounting tutor for ACC 201 (Intro Financial Accounting).
When a student answers a multiple-choice question:
- If CORRECT: start with exactly "[CORRECT]" then briefly explain WHY in 1-2 sentences.
- If WRONG: start with exactly "[NEEDS WORK]" then ask 1-2 guiding questions leading toward the concept. NEVER reveal the correct answer. Be encouraging.
Keep responses under 80 words.`;

const VARIANT = `You are an accounting professor. Generate a VARIANT of the given question — same concept, different company/numbers/scenario.
Return ONLY valid JSON (no markdown): {"question":"...","choices":["A","B","C","D"],"answer":"exact text of correct choice"}
The answer must be one of the choices verbatim.`;

function DiffBadge({ d }) {
  const c = d === 'easy' ? 'bg-green-100 text-green-800' : d === 'medium' ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800';
  return <span className={'text-xs font-semibold px-2 py-0.5 rounded-full ' + c}>{d}</span>;
}

function ProgressBar({ pct }) {
  return (
    <div className="w-full bg-gray-200 rounded-full h-2">
      <div className="bg-blue-500 h-2 rounded-full transition-all duration-500" style={{ width: pct + '%' }} />
    </div>
  );
}

function SetupScreen({ onStart }) {
  const [key, setKey] = useState('');
  const [count, setCount] = useState(20);
  const [err, setErr] = useState('');
  function go() {
    if (!key.trim()) { setErr('Please enter your Anthropic API key.'); return; }
    onStart(key.trim(), Number(count));
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-indigo-100">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in">
        <div className="text-center mb-6">
          <div className="text-5xl mb-3">📚</div>
          <h1 className="text-2xl font-bold text-gray-800">ACC 201 Exam Prep</h1>
          <p className="text-gray-500 mt-1 text-sm">Introductory Financial Accounting · {QUESTIONS.length} questions</p>
        </div>
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Anthropic API Key</label>
            <input type="password" value={key} onChange={e => setKey(e.target.value)} placeholder="sk-ant-..."
              className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">
              Questions: <span className="text-blue-600 font-bold">{count}</span>
            </label>
            <input type="range" min="5" max={QUESTIONS.length} value={count}
              onChange={e => setCount(e.target.value)} className="w-full accent-blue-500" />
            <div className="flex justify-between text-xs text-gray-400 mt-0.5"><span>5</span><span>{QUESTIONS.length}</span></div>
          </div>
          {err && <p className="text-red-500 text-sm">{err}</p>}
          <button onClick={go}
            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm">
            Start Practice Session
          </button>
        </div>
        <p className="text-xs text-gray-400 text-center mt-4">API key stays in your browser — never stored.</p>
      </div>
    </div>
  );
}

function QuizScreen({ q, idx, total, attempts, onAnswer, loading, apiError }) {
  const [sel, setSel] = useState(null);
  useEffect(() => { setSel(null); }, [q.id, attempts]);
  const pct = Math.round((idx / total) * 100);
  return (
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-2xl mx-auto">
        <div className="flex items-center justify-between mb-3">
          <span className="text-sm text-gray-500 font-medium">Question {idx + 1} / {total}</span>
          <div className="flex gap-2 items-center">
            <DiffBadge d={q.difficulty} />
            {q._variant && <span className="text-xs bg-purple-100 text-purple-700 font-semibold px-2 py-0.5 rounded-full">Variant</span>}
          </div>
        </div>
        <ProgressBar pct={pct} />
        <p className="text-xs text-blue-600 font-semibold mt-3 mb-1 uppercase tracking-wide truncate">{q.topic}</p>
        {attempts > 0 && (
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-xs text-gray-400">Wrong attempts:</span>
            {[0,1,2].map(i => <div key={i} className={'w-2.5 h-2.5 rounded-full ' + (i < attempts ? 'bg-red-400' : 'bg-gray-200')} />)}
          </div>
        )}
        <div className="bg-white rounded-2xl shadow p-6 mt-2 fade-in">
          <p className="text-gray-800 font-medium text-sm leading-relaxed whitespace-pre-wrap">{q.question}</p>
          <div className="mt-5 space-y-2">
            {q.choices.map((c, i) => (
              <button key={i} onClick={() => setSel(c)}
                className={'choice-btn w-full text-left px-4 py-3 rounded-xl border-2 text-sm ' +
                  (sel === c ? 'border-blue-500 bg-blue-50 text-blue-800 font-medium'
                    : 'border-gray-200 bg-gray-50 hover:border-blue-300 hover:bg-blue-50 text-gray-700')}>
                <span className="font-bold mr-2 text-gray-400">{String.fromCharCode(65+i)}.</span>{c}
              </button>
            ))}
          </div>
          {apiError && <p className="text-red-500 text-xs mt-3 bg-red-50 rounded p-2">{apiError}</p>}
          <button onClick={() => sel && !loading && onAnswer(sel)} disabled={!sel || loading}
            className={'mt-5 w-full py-2.5 rounded-xl font-semibold text-sm transition-colors ' +
              (!sel || loading ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white')}>
            {loading ? '⏳ Getting feedback…' : 'Submit Answer'}
          </button>
        </div>
      </div>
    </div>
  );
}

function FeedbackScreen({ q, selected, feedback, correct, attempts, onNext, onRetry, loadingVariant }) {
  const isWrong = !correct;
  const canRetry = isWrong && attempts < 3;
  const exhausted = isWrong && attempts >= 3;
  const left = 3 - attempts;
  return (
    <div className={'min-h-screen p-4 ' + (isWrong ? 'bg-red-50' : 'bg-green-50')}>
      <div className="max-w-2xl mx-auto pt-6">

        {canRetry && (
          <button onClick={() => onRetry(false)}
            style={{fontSize:'1.1rem', padding:'18px', marginBottom:'12px', display:'block', width:'100%',
              background:'#ea580c', color:'white', border:'none', borderRadius:'14px',
              fontWeight:'800', cursor:'pointer', boxShadow:'0 2px 8px rgba(234,88,12,0.4)'}}>
            Try Again &mdash; {left} attempt{left !== 1 ? 's' : ''} left
          </button>
        )}

        {exhausted && (
          <button onClick={() => onRetry(true)} disabled={loadingVariant}
            style={{fontSize:'1.1rem', padding:'18px', marginBottom:'12px', display:'block', width:'100%',
              background:'#7c3aed', color:'white', border:'none', borderRadius:'14px',
              fontWeight:'800', cursor:'pointer', opacity: loadingVariant ? 0.6 : 1,
              boxShadow:'0 2px 8px rgba(124,58,237,0.4)'}}>
            {loadingVariant ? 'Generating variant question...' : 'Practice a New Variant Question'}
          </button>
        )}

        <div className="bg-white rounded-2xl shadow p-6 fade-in">
          <div className={'flex items-center gap-3 mb-4 pb-4 border-b ' + (isWrong ? 'border-red-100' : 'border-green-100')}>
            <span className="text-3xl">{isWrong ? '❌' : '✅'}</span>
            <div>
              <p className={'font-bold text-lg ' + (isWrong ? 'text-red-700' : 'text-green-700')}>
                {isWrong ? 'Not quite — keep thinking!' : 'Correct!'}
              </p>
              <p className="text-xs text-gray-400">You chose: <em>{selected}</em></p>
            </div>
          </div>
          <div className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-4">{feedback}</div>
          {exhausted && (
            <div className="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-xl text-sm">
              <p className="font-semibold text-yellow-800 mb-1">Correct answer:</p>
              <p className="text-yellow-900">{q.answer}</p>
            </div>
          )}
          <div className="mt-5">
            {!isWrong && (
              <button onClick={onNext}
                className="w-full py-3 rounded-xl font-bold text-base bg-green-600 hover:bg-green-700 text-white transition-colors">
                Next Question →
              </button>
            )}
            {isWrong && (
              <button onClick={onNext}
                className="w-full py-2 rounded-xl font-medium text-sm text-gray-400 hover:text-gray-600 border border-gray-200 hover:border-gray-300 bg-white transition-colors">
                Skip to Next →
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function SummaryScreen({ results, total, onRestart }) {
  const nCorrect = results.filter(r => r.correct).length;
  const pct = Math.round((nCorrect / total) * 100);
  const grade = pct >= 90 ? 'A' : pct >= 80 ? 'B' : pct >= 70 ? 'C' : pct >= 60 ? 'D' : 'F';
  const gc = pct >= 80 ? 'text-green-600' : pct >= 70 ? 'text-yellow-600' : 'text-red-600';
  const tm = {};
  results.forEach(r => {
    if (!tm[r.topic]) tm[r.topic] = { c: 0, t: 0 };
    tm[r.topic].t++;
    if (r.correct) tm[r.topic].c++;
  });
  const weak = Object.entries(tm).filter(([,v]) => v.c/v.t < 0.6)
    .sort((a,b) => a[1].c/a[1].t - b[1].c/b[1].t).slice(0,4);
  return (
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-2xl mx-auto">
        <div className="bg-white rounded-2xl shadow p-8 mt-6 text-center fade-in">
          <div className="text-5xl mb-2">🎓</div>
          <h2 className="text-2xl font-bold text-gray-800">Session Complete</h2>
          <div className="my-6">
            <span className={'text-7xl font-extrabold ' + gc}>{grade}</span>
            <p className="text-gray-500 mt-1">{nCorrect} / {total} correct · {pct}%</p>
          </div>
          <ProgressBar pct={pct} />
          {weak.length > 0 && (
            <div className="mt-6 text-left bg-yellow-50 rounded-xl p-4">
              <p className="font-semibold text-yellow-800 mb-2 text-sm">📌 Topics to review:</p>
              <ul className="space-y-1">
                {weak.map(([t,v]) => (
                  <li key={t} className="text-xs text-yellow-900">
                    <span className="font-medium">{t}</span>
                    <span className="text-yellow-600 ml-2">({v.c}/{v.t})</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
          <button onClick={onRestart}
            className="mt-6 w-full py-3 rounded-xl font-semibold text-sm bg-blue-600 hover:bg-blue-700 text-white transition-colors">
            Start New Session
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('setup');
  const [apiKey, setApiKey] = useState('');
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [attempts, setAttempts] = useState(0);
  const [selChoice, setSelChoice] = useState('');
  const [feedback, setFeedback] = useState('');
  const [isCorrect, setIsCorrect] = useState(false);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadingV, setLoadingV] = useState(false);
  const [apiErr, setApiErr] = useState('');
  const [curQ, setCurQ] = useState(null);

  function handleStart(key, n) {
    const q = shuffle(QUESTIONS).slice(0, Math.min(n, QUESTIONS.length));
    setApiKey(key); setQueue(q); setIdx(0); setAttempts(0); setResults([]); setCurQ(q[0]); setScreen('quiz');
  }

  async function handleAnswer(choice) {
    if (!curQ) return;
    setLoading(true); setApiErr('');
    const ok = choice === curQ.answer;
    const newAttempts = attempts + (ok ? 0 : 1);
    try {
      const msg = 'Question: ' + curQ.question +
        '\n\nChoices:\n' + curQ.choices.map((c,i) => String.fromCharCode(65+i)+'. '+c).join('\n') +
        '\n\nStudent chose: "' + choice + '"\nCorrect answer: "' + curQ.answer + '"\nStudent is ' + (ok ? 'CORRECT' : 'WRONG') + '.';
      const fb = await callClaude(apiKey, [{role:'user',content:msg}], SOCRATIC);
      setFeedback(fb.replace(/^\[CORRECT\]\s*/,'').replace(/^\[NEEDS WORK\]\s*/,''));
      setIsCorrect(ok); setSelChoice(choice); setAttempts(newAttempts); setScreen('feedback');
    } catch(e) {
      setApiErr('Error: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  async function handleRetry(genVariant) {
    if (genVariant) {
      setLoadingV(true);
      try {
        const p = 'Original question:\n' + curQ.question + '\n\nChoices:\n' + curQ.choices.join('\n') +
          '\n\nCorrect answer: ' + curQ.answer + '\n\nTopic: ' + curQ.topic + '\n\nGenerate variant JSON now.';
        const raw = await callClaude(apiKey, [{role:'user',content:p}], VARIANT);
        const v = JSON.parse(raw.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim());
        setCurQ({id:curQ.id+0.1,question:v.question,choices:v.choices,answer:v.answer,
          topic:curQ.topic,difficulty:curQ.difficulty,_variant:true});
        setAttempts(0); setScreen('quiz');
      } catch(e) {
        setApiErr('Variant error: '+e.message); setScreen('quiz');
      } finally { setLoadingV(false); }
    } else {
      setScreen('quiz');
    }
  }

  function handleNext() {
    const r = [...results, {id:curQ.id, topic:curQ.topic, correct:isCorrect}];
    setResults(r);
    const ni = idx + 1;
    if (ni >= queue.length) { setScreen('summary'); return; }
    setIdx(ni); setCurQ(queue[ni]); setAttempts(0); setScreen('quiz');
  }

  if (screen === 'setup') return <SetupScreen onStart={handleStart} />;
  if (screen === 'summary') return <SummaryScreen results={results} total={queue.length} onRestart={() => setScreen('setup')} />;
  if (screen === 'feedback') return (
    <FeedbackScreen key={curQ.id + '-' + attempts} q={curQ} selected={selChoice} feedback={feedback} correct={isCorrect}
      attempts={attempts} onNext={handleNext} onRetry={handleRetry} loadingVariant={loadingV} />
  );
  return <QuizScreen q={curQ} idx={idx} total={queue.length} attempts={attempts}
    onAnswer={handleAnswer} loading={loading} apiError={apiErr} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
